services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopfront-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://shopfront:${POSTGRES_PASSWORD:-shopfront_prod_password}@postgres:5432/shopfront?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    container_name: shopfront-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopfront
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopfront_prod_password}
      POSTGRES_DB: shopfront
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: shopfront-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
